<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Pre-Assessment System</title>
    <script crossorigin src="https://unpkg.com/@daily-co/daily-js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f0f23;
            height: 100vh;
            color: #e2e8f0;
            overflow: hidden;
        }

        /* 3-COLUMN GRID */
        .layout {
            display: grid;
            grid-template-columns: 280px 1fr 320px;
            height: 100vh;
            gap: 0;
        }

        /* LEFT: DEBUG LOG */
        .debug-column {
            background: #0a0a1a;
            border-right: 1px solid #1a1a2e;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .debug-header {
            padding: 14px 16px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6366f1;
            border-bottom: 1px solid #1a1a2e;
            flex-shrink: 0;
        }

        .log-panel {
            flex: 1;
            background: transparent;
            color: #0f0;
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            font-size: 11px;
            padding: 10px 12px;
            overflow-y: auto;
            line-height: 1.5;
        }
        .log-panel .error { color: #f66; }
        .log-panel .success { color: #6f6; }
        .log-panel .tool { color: #ff0; }

        /* CENTER: VIDEO */
        .video-column {
            display: flex;
            flex-direction: column;
            background: #0f0f23;
            overflow: hidden;
        }

        .video-header {
            padding: 16px 24px;
            text-align: center;
            flex-shrink: 0;
        }

        .video-header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: white;
        }

        .container {
            flex: 1;
            position: relative;
            background: #1a1a2e;
            margin: 0 16px;
            border-radius: 12px;
            overflow: hidden;
            min-height: 0;
        }

        #video-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        #video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .start-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 20px;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 14px 44px;
            font-size: 1.05rem;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .info { color: #888; font-size: 0.9rem; }
        .hidden { display: none !important; }

        .video-footer {
            padding: 12px 16px;
            text-align: center;
            flex-shrink: 0;
        }

        .stop-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 10px 28px;
            font-size: 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .stop-btn:hover { background: #b91c1c; }

        /* RIGHT: CHAT */
        .chat-column {
            background: #0a0a1a;
            border-left: 1px solid #1a1a2e;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-panel {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            padding: 14px 16px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6366f1;
            border-bottom: 1px solid #1a1a2e;
            flex-shrink: 0;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 14px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 0;
            scroll-behavior: smooth;
        }

        .chat-msg {
            display: flex;
            flex-direction: column;
            max-width: 90%;
        }
        .chat-msg.user { align-self: flex-end; }
        .chat-msg.Ram { align-self: flex-start; }

        .chat-msg .sender {
            font-size: 0.65rem;
            color: #666;
            margin-bottom: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .chat-msg.user .sender { text-align: right; }

        .chat-msg .bubble {
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 0.84rem;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .chat-msg.Ram .bubble {
            background: #1a1a2e;
            color: #d0d0f0;
            border-bottom-left-radius: 4px;
        }
        .chat-msg.user .bubble {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .chat-msg.user.typed .bubble {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        .chat-msg.user.spoken .bubble {
            background: #2a2a4a;
            color: #b0b0d0;
            font-style: italic;
        }

        .chat-input-area {
            display: flex;
            gap: 8px;
            padding: 12px 14px;
            border-top: 1px solid #1a1a2e;
            flex-shrink: 0;
        }
        .chat-input-area input {
            flex: 1;
            background: #0f0f23;
            border: 1px solid #2a2a4a;
            border-radius: 20px;
            padding: 10px 16px;
            color: white;
            font-size: 0.85rem;
            outline: none;
        }
        .chat-input-area input:focus { border-color: #667eea; }
        .chat-input-area input::placeholder { color: #444; }

        .chat-input-area button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            cursor: pointer;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s;
            flex-shrink: 0;
        }
        .chat-input-area button:hover { transform: scale(1.1); }
        .chat-input-area button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        /* RESPONSIVE */
        @media (max-width: 1000px) {
            .layout {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr auto;
                height: auto;
                min-height: 100vh;
            }
            body { overflow: auto; }
            .debug-column { max-height: 200px; border-right: none; border-bottom: 1px solid #1a1a2e; }
            .chat-column { max-height: 350px; border-left: none; border-top: 1px solid #1a1a2e; }
            .container { margin: 0 12px; min-height: 300px; }
        }
    </style>
</head>
<body>

<div class="layout">

    <!-- LEFT: DEBUG LOG -->
    <div class="debug-column">
        <div class="debug-header">Debug Log</div>
        <div class="log-panel" id="log-panel">
            <div>System ready...</div>
        </div>
    </div>

    <!-- CENTER: VIDEO -->
    <div class="video-column">
        <div class="video-header">
            <h1>Patient Pre-Assessment System</h1>
        </div>

        <div class="container" id="container">
            <div class="start-container" id="start-container">
                <p class="info">Click to start conversation with AI receptionist</p>
                <button type="button" class="start-btn" id="btn-start">Start Conversation</button>
            </div>
            <div id="video-container" class="hidden"></div>
        </div>

        <div class="video-footer">
            <button type="button" class="stop-btn hidden" id="btn-stop">Stop & Save Credits</button>
        </div>
    </div>

    <!-- RIGHT: CHAT -->
    <div class="chat-column">
        <div class="chat-panel hidden" id="chat-panel">
            <div class="chat-header">Conversation</div>
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Type a message..." disabled />
                <button type="button" id="btn-send" disabled>&#9654;</button>
            </div>
        </div>
    </div>

</div>

<script type="module" src="js/main.js"></script>

</body>
</html>
